<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 100" width="100%" height="100%">
  <defs>
    <linearGradient id="zgradMain" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF6B35"/>
      <stop offset="100%" stop-color="#FF8C42"/>
    </linearGradient>
    <linearGradient id="zgradAccent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00D4FF"/>
      <stop offset="100%" stop-color="#00D4FF"/>
    </linearGradient>
  </defs>

  <!-- Logo Mark (The Z) -->
  <g transform="translate(10, 10)">
    <!-- Glassmorphic / Gradient Base Background -->
    <rect width="80" height="80" rx="20" fill="url(#zgradMain)"/>
    <path d="M 22 28 L 58 28 L 38 68 L 58 68" fill="none" stroke="white" stroke-width="12" stroke-linecap="round" stroke-linejoin="round"/>
    
    <!-- Deep spark/lightning inside Z -->
    <path d="M 60 15 L 45 45 L 65 45 L 35 85 L 45 55 L 25 55 Z" fill="url(#zgradAccent)" opacity="0.9" transform="scale(0.55) translate(30, 20)"/>
  </g>

  <!-- Wordmark "ZAYKO" -->
  <text x="110" y="66" font-family="'Inter', -apple-system, system-ui, sans-serif" font-size="52" font-weight="900" fill="white" letter-spacing="1.5">ZAYKO</text>
  
  <!-- Subtle Tagline aligned perfectly under the letters -->
  <text x="115" y="86" font-family="'Inter', -apple-system, system-ui, sans-serif" font-size="13" font-weight="700" fill="#00D4FF" letter-spacing="5.5">ORDER ENGINE</text>
</svg>
